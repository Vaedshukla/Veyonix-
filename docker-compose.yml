
# ================================================================
# Veyonix — Development Docker Compose
# Services: PostgreSQL 17, Redis 7, PgAdmin, Mailpit, Backend
# ================================================================

services:
  # ── PostgreSQL 17 ─────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: veyonix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: veyonix
      POSTGRES_PASSWORD: veyonix_dev_password
      POSTGRES_DB: veyonix
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U veyonix -d veyonix']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - veyonix-network

  # ── Redis 7 ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: veyonix-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass veyonix_redis_dev_password
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
      - ./infra/docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'veyonix_redis_dev_password', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - veyonix-network

  # ── Redis Insight (optional GUI) ──────────────────────────────
  redis-insight:
    image: redis/redisinsight:latest
    container_name: veyonix-redis-insight
    restart: unless-stopped
    ports:
      - '5540:5540'
    volumes:
      - redis_insight_data:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - veyonix-network
    profiles:
      - tools  # Only starts with: docker compose --profile tools up

  # ── PgAdmin 4 (optional GUI) ─────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: veyonix-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@veyonix.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - veyonix-network
    profiles:
      - tools

  # ── Mailpit (local email testing) ────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: veyonix-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025'  # SMTP
      - '8025:8025'  # Web UI
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - veyonix-network

# ================================================================
# Volumes
# ================================================================
volumes:
  postgres_data:
    name: veyonix_postgres_data
  redis_data:
    name: veyonix_redis_data
  redis_insight_data:
    name: veyonix_redis_insight_data
  pgadmin_data:
    name: veyonix_pgadmin_data

# ================================================================
# Networks
# ================================================================
networks:
  veyonix-network:
    name: veyonix-network
    driver: bridge
