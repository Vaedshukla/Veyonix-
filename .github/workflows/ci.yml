name: Veyonix CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  # ── Lint & Type Check ────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm --filter=@veyonix/backend format --check

  # ── Unit Tests ───────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'

      - name: Run unit tests
        run: pnpm --filter=@veyonix/backend test
        env:
          NODE_ENV: test
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'
          REDIS_URL: 'redis://localhost:6379'
          JWT_ACCESS_SECRET: 'test-access-secret-at-least-32-characters-long'
          JWT_REFRESH_SECRET: 'test-refresh-secret-at-least-32-characters-long'
          JWT_AGENT_SECRET: 'test-agent-secret-at-least-32-characters-long'

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: apps/backend/coverage/

  # ── Integration Tests ────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: veyonix
          POSTGRES_PASSWORD: veyonix_test_password
          POSTGRES_DB: veyonix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client & run migrations
        run: |
          pnpm db:generate
          pnpm --filter=@veyonix/backend prisma migrate deploy
        env:
          DATABASE_URL: 'postgresql://veyonix:veyonix_test_password@localhost:5432/veyonix_test'

      - name: Run integration tests
        run: pnpm --filter=@veyonix/backend test:integration
        env:
          NODE_ENV: test
          DATABASE_URL: 'postgresql://veyonix:veyonix_test_password@localhost:5432/veyonix_test'
          REDIS_URL: 'redis://localhost:6379'
          JWT_ACCESS_SECRET: 'test-access-secret-at-least-32-characters-long'
          JWT_REFRESH_SECRET: 'test-refresh-secret-at-least-32-characters-long'
          JWT_AGENT_SECRET: 'test-agent-secret-at-least-32-characters-long'

  # ── Build ────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'

      - name: Build backend
        run: pnpm backend:build

      - name: Validate Prisma schema
        run: pnpm --filter=@veyonix/backend prisma validate
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'

  # ── Docker Build (on main only) ──────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build, integration-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation only)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: false
          tags: veyonix/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
